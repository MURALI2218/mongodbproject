

<div  class="popup-overlay">
    <div class="popup-box">
       

<form action="/updateplace/{{newinfo._id | string}}" method="POST"  enctype="multipart/form-data" class="modal">
    <label class="form-label">State</label><br>
    <select class="form-content-popup" name="state"  required>
        <option value={{newinfo.state}} selected>{{newinfo.state}}</option>
        <option value="TamilNadu">TamilNadu</option>
        <option value="Maharastra">Maharastra</option>
        <option value="Jammu and Kashmir">Jammu and Kashmir</option>
        <option value="Uttarkand">Uttarkand</option>
         <option value="Himachal Pradesh">Himachal Pradesh</option>
         <option value="Rajasathan">Rajasthan</option>
        </select><br><br>

    <label class="form-label">Location</label><br>
    <input class="form-content-popup" type="text" name="location" value={{newinfo.location}} required><br><br>

    <label class="form-label">Upload Image</label><br>
     <input class="form-content-popup" type="file" name="image" accept="image/*"   required><br><br>
     <img src="{{ url_for('static', filename='images/'+newinfo.image) }}" alt="IMAGE NOT FOUND" width="300"> <br>
        
    <label class="form-label">Number of Days</label><br>
    <input class="form-content-popup" type="number" name="days" placeholder="No.Of.Days"  value={{newinfo.days}} required><br><br>

    <label class="form-label">Guide Avail</label>
    <input class="form-content-popup" type="checkbox" name="guide" value="Yes"><br><br>

    <label class="form-label">Total Cost Per person</label><br>
    <input class="form-content-popup" type="number" name="cost" placeholder="Package" required  value={{newinfo.cost}}><br><br>

    <label class="form-label">No of Seats</label><br>
    <input class="form-content-popup" type="number" name="seats" placeholder="No of Vacancy" required  value={{newinfo.seats}}><br><br>

    <label class="form-label">Climate</label><br>
    <select class="form-content-popup" name="climate" required  value={{newinfo.climate}}>
        <option disabled selected>{{newinfo.climate}}</option>
        <option value="Monsoon">Monsoon</option>
        <option value="Winter">Winter</option>
        <option value="Snow">Snow</option>
        <option value="Summer">Summer</option>
        <option value="Cloudy">Cloudy</option>
        </select><br><br>

    <button type="submit"style="padding:10px">Update Location</button>
</form>
</div>
</div>
