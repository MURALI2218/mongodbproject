<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>


<div class="login-container">
   <h2>Login</h2>
   <form action="/cerds" method="POST">
       <label for="username"><b>Username</b></label><br>
       <input style="width: 100%;" type="text" id="username" name="username" placeholder="Enter Username" required> <br><br>
       <label for="password"><b>Password</b></label><br>
       <input style="width: 100%;" type="password" id="password" name="password" placeholder="Enter Password" required><br><br>
     
       <button type="submit" style="width: 324px;">Login</button><br>
       <label><input type="checkbox" name="remember"> Remember me</label>
       <p><a href="#">Forgot password?</a></p>
       <p><a href='/signup'>Sign Up</a></p>
   </form>
</div>
</body>
</html>
